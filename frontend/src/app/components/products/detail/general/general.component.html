<div class="general">
    <div class="top product-name">
        {{ product().name }}
    </div>

    {{ product().short_description }}

    <p-divider />

    <div class="product-order-information">
        <div>
            <i class="pi pi-check" style="color: var(--primary-blue)"></i>
            <p>Kostenloser Versand</p>
        </div>
        <div>
            <i class="pi pi-check" style="color: var(--primary-blue)"></i>
            <p>1-3 Tage Lieferzeit</p>
        </div>
        <div>
            <i class="pi pi-check" style="color: var(--primary-blue)"></i>
            <p>Hochwertige Verarbeitung</p>
        </div>
    </div>

    <p-divider />

    <div class="product-price-wrapper">
        <div class="product-price">
            {{ product().price | number: '1.2-2' }}€
        </div>
        <div class="product-price-add">inkl. MwSt.</div>
    </div>

    <div class="product-order-status">
        <i class="pi pi-check-circle"></i>
        <p class="">Sofort lieferbar</p>
    </div>

    <button class="product-order button-blue" type="button">
        In den Warenkorb
    </button>
</div>
